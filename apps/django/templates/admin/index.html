{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<style>
    .dashboard-shell {
        position: relative;
    }

    .dashboard-shell::before {
        content: "";
        position: absolute;
        inset: -16px 0 auto;
        height: 180px;
        pointer-events: none;
        background:
            radial-gradient(circle at top left, rgba(14, 165, 233, 0.10), transparent 36%),
            radial-gradient(circle at top right, rgba(16, 185, 129, 0.10), transparent 30%);
        filter: blur(10px);
    }

    .mini-grid {
        background-image:
            linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
            linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px);
        background-size: 24px 24px;
    }
</style>

<div x-data="dashboard()" x-init="init()" class="dashboard-shell space-y-5">
    <template x-if="loading">
        <div class="flex items-center justify-center gap-3 py-20 text-base-400 dark:text-base-500">
            <span class="material-symbols-outlined text-3xl animate-spin leading-none">progress_activity</span>
            <span class="text-sm">{% trans "Loading dashboard…" %}</span>
        </div>
    </template>

    <template x-if="!loading && kpis">
        <div class="relative space-y-5">
            <div class="overflow-hidden rounded-3xl border border-slate-200/80 text-white shadow-xl dark:border-base-700"
                 style="background: linear-gradient(135deg, #0f172a 0%, #132238 42%, #0f766e 100%);">
                <div class="grid gap-4 px-5 py-5 lg:grid-cols-4 lg:px-6">
                    <div class="space-y-3 lg:col-span-1">
                        <div class="flex items-center justify-between gap-3">
                            <div>
                                <div class="text-xs font-semibold uppercase tracking-widest text-sky-100/80">{% trans "Control center" %}</div>
                                <h1 class="mt-1 text-2xl font-semibold tracking-tight text-white">{% trans "Homepage dashboard" %}</h1>
                            </div>
                            <div class="rounded-full border border-white/15 bg-white/10 px-3 py-1 text-xs font-medium text-slate-200">
                                {% trans "Live view" %}
                            </div>
                        </div>
                        <p class="text-sm leading-6 text-slate-300">
                            {% trans "Track traffic, queue pressure and important activity from one compact screen." %}
                        </p>

                        <div class="space-y-2.5">
                            <template x-for="item in leftPanelItems()" :key="item.key">
                                <template x-if="!item.href">
                                    <div class="rounded-2xl border px-4 py-3"
                                         :class="item.variant === 'action'
                                             ? 'border-white/12 bg-white/10'
                                             : 'border-white/10 bg-slate-950/20'">
                                        <div class="flex items-center gap-3">
                                            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border"
                                                 :class="item.tone === 'emerald'
                                                     ? 'border-emerald-300/20 bg-emerald-400/10 text-emerald-100'
                                                     : item.tone === 'amber'
                                                         ? 'border-amber-300/20 bg-amber-400/10 text-amber-100'
                                                         : item.tone === 'rose'
                                                             ? 'border-rose-300/20 bg-rose-400/10 text-rose-100'
                                                             : 'border-sky-300/20 bg-sky-400/10 text-sky-100'">
                                                <span class="material-symbols-outlined text-lg leading-none" x-text="item.icon"></span>
                                            </div>
                                            <div class="min-w-0 flex-1">
                                                <div class="flex items-start justify-between gap-3">
                                                    <div class="min-w-0">
                                                        <div class="truncate text-sm font-semibold text-white" x-text="item.label"></div>
                                                        <div class="mt-0.5 text-xs text-slate-400" x-text="item.caption"></div>
                                                    </div>
                                                    <div class="shrink-0 text-right">
                                                        <div class="text-xl font-semibold text-white"
                                                             x-text="item.format === 'currency' ? currency(item.value) : fmt(item.value)"></div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                                <template x-if="item.href">
                                    <a :href="item.href"
                                       class="group block rounded-2xl border border-white/15 bg-white/10 px-4 py-3 transition-all hover:-translate-y-0.5 hover:bg-white/14">
                                        <div class="flex items-center gap-3">
                                            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl border"
                                                 :class="item.tone === 'emerald'
                                                     ? 'border-emerald-300/20 bg-emerald-400/10 text-emerald-100'
                                                     : item.tone === 'amber'
                                                         ? 'border-amber-300/20 bg-amber-400/10 text-amber-100'
                                                         : item.tone === 'rose'
                                                             ? 'border-rose-300/20 bg-rose-400/10 text-rose-100'
                                                             : 'border-sky-300/20 bg-sky-400/10 text-sky-100'">
                                                <span class="material-symbols-outlined text-lg leading-none" x-text="item.icon"></span>
                                            </div>
                                            <div class="min-w-0 flex-1">
                                                <div class="flex items-start justify-between gap-3">
                                                    <div class="min-w-0">
                                                        <div class="truncate text-sm font-semibold text-white" x-text="item.label"></div>
                                                        <div class="mt-0.5 text-xs text-slate-300" x-text="item.caption"></div>
                                                    </div>
                                                    <div class="flex items-center gap-3 shrink-0">
                                                        <div class="text-right">
                                                            <div class="text-xl font-semibold text-white"
                                                                 x-text="item.format === 'currency' ? currency(item.value) : fmt(item.value)"></div>
                                                        </div>
                                                        <span class="material-symbols-outlined text-base text-white/70 transition-transform group-hover:translate-x-0.5">arrow_forward</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </a>
                                </template>
                            </template>
                        </div>
                    </div>

                    <div class="grid gap-4 lg:col-span-3 lg:grid-cols-4">
                        <div class="overflow-hidden rounded-3xl border border-white/10 bg-white/10 backdrop-blur-sm lg:col-span-3">
                            <div class="flex items-center justify-between gap-3 border-b border-white/10 px-5 py-4">
                                <div>
                                    <div class="text-xs font-semibold uppercase tracking-widest text-slate-300">{% trans "Realtime pulse" %}</div>
                                    <div class="mt-1 text-lg font-semibold text-white">{% trans "Orders and revenue flow" %}</div>
                                </div>
                                <div class="flex items-center gap-2 text-xs text-slate-300">
                                    <span class="h-2.5 w-2.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                    {% trans "Updating" %}
                                </div>
                            </div>

                            <div class="mini-grid px-5 py-4">
                                <div class="grid gap-4 md:grid-cols-2">
                                    <div class="rounded-2xl border border-white/10 bg-slate-950/20 p-4">
                                        <div class="flex items-center justify-between gap-3">
                                            <div>
                                                <div class="text-xs font-semibold uppercase tracking-widest text-slate-400">{% trans "Orders trend" %}</div>
                                                <div class="mt-2 text-2xl font-semibold text-white" x-text="fmt(kpis.orders_today)"></div>
                                            </div>
                                            <span class="material-symbols-outlined text-2xl text-sky-200">monitoring</span>
                                        </div>
                                        <svg viewBox="0 0 320 120" class="mt-4 h-28 w-full">
                                            <polyline fill="none" stroke="rgba(56,189,248,0.22)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" :points="ordersLineShadow()"></polyline>
                                            <polyline fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" :points="ordersLine()"></polyline>
                                            <template x-for="point in ordersPoints()" :key="point.x">
                                                <circle :cx="point.x" :cy="point.y" r="4" fill="#0f172a" stroke="#38bdf8" stroke-width="3"></circle>
                                            </template>
                                        </svg>
                                    </div>

                                    <div class="rounded-2xl border border-white/10 bg-slate-950/20 p-4">
                                        <div class="flex items-center justify-between gap-3">
                                            <div>
                                                <div class="text-xs font-semibold uppercase tracking-widest text-slate-400">{% trans "Revenue trend" %}</div>
                                                <div class="mt-2 text-2xl font-semibold text-white" x-text="currency(kpis.revenue_today)"></div>
                                            </div>
                                            <span class="material-symbols-outlined text-2xl text-emerald-200">candlestick_chart</span>
                                        </div>
                                        <div class="mt-4 space-y-2">
                                            <template x-for="(day, i) in chart" :key="i">
                                                <div class="grid grid-cols-12 items-center gap-3">
                                                    <div class="col-span-2 text-xs text-slate-400" x-text="shortDate(day.date)"></div>
                                                    <div class="col-span-7 h-2.5 overflow-hidden rounded-full bg-white/10">
                                                        <div class="h-full rounded-full bg-gradient-to-r from-emerald-300 to-emerald-500"
                                                             :style="'width:' + barWidth(day.revenue, maxRevenue) + '%'"></div>
                                                    </div>
                                                    <div class="col-span-3 text-right text-xs font-medium text-slate-300" x-text="compactCurrency(day.revenue)"></div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="overflow-hidden rounded-3xl border border-white/10 bg-white/10 backdrop-blur-sm lg:col-span-1">
                            <div class="flex items-center justify-between gap-3 border-b border-white/10 px-5 py-4">
                                <div>
                                    <div class="text-xs font-semibold uppercase tracking-widest text-slate-300">{% trans "Live activity" %}</div>
                                    <div class="mt-1 text-lg font-semibold text-white">{% trans "Important feed" %}</div>
                                </div>
                                <span class="material-symbols-outlined text-lg text-white/70">hub</span>
                            </div>
                            <div class="space-y-5 px-5 py-5">
                                <template x-for="entry in activityFeed()" :key="entry.key">
                                    <div class="rounded-2xl border border-white/10 bg-slate-950/20 px-5 py-3.5">
                                        <div class="flex items-center gap-4">
                                            <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl border"
                                                 :class="entry.tone === 'emerald'
                                                     ? 'border-emerald-300/20 bg-emerald-400/10 text-emerald-100'
                                                     : entry.tone === 'amber'
                                                         ? 'border-amber-300/20 bg-amber-400/10 text-amber-100'
                                                         : entry.tone === 'rose'
                                                             ? 'border-rose-300/20 bg-rose-400/10 text-rose-100'
                                                             : 'border-sky-300/20 bg-sky-400/10 text-sky-100'">
                                                <span class="material-symbols-outlined text-base leading-none" x-text="entry.icon"></span>
                                            </div>
                                            <div class="min-w-0 flex-1">
                                                <div class="flex items-center justify-between gap-3">
                                                    <div class="min-w-0 pr-2">
                                                        <div class="text-sm font-semibold text-white" x-text="entry.title"></div>
                                                    </div>
                                                    <div class="shrink-0 rounded-full border border-white/10 bg-white/5 px-2.5 py-1.5 text-xs font-medium text-white"
                                                         x-text="entry.value"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="grid gap-4 lg:grid-cols-4">
                <div class="overflow-hidden rounded-3xl border border-base-200/80 bg-white shadow-sm dark:border-base-700 dark:bg-base-900 lg:col-span-3">
                    <div class="flex items-center justify-between gap-3 border-b border-base-200/80 px-5 py-4 dark:border-base-700">
                        <div>
                            <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Traffic map" %}</div>
                            <div class="mt-1 text-lg font-semibold text-base-900 dark:text-base-50">{% trans "7-day operational density" %}</div>
                        </div>
                        <span class="text-xs text-base-400 dark:text-base-500">{% trans "Orders vs queue pressure" %}</span>
                    </div>
                    <div class="grid gap-3 px-5 py-4 md:grid-cols-7">
                        <template x-for="(day, i) in chart" :key="i">
                            <div class="rounded-2xl border border-base-100 bg-base-50/80 p-3 dark:border-base-800 dark:bg-base-950/30">
                                <div class="text-xs font-semibold uppercase tracking-wider text-base-400 dark:text-base-500" x-text="shortDate(day.date)"></div>
                                <div class="mt-3 space-y-2">
                                    <div class="rounded-xl p-2 text-white"
                                         :style="'background:' + heatColor(day.orders, maxOrders)">
                                        <div class="text-xs uppercase tracking-wider text-white/80">{% trans "Orders" %}</div>
                                        <div class="mt-1 text-lg font-semibold" x-text="fmt(day.orders)"></div>
                                    </div>
                                    <div class="rounded-xl border border-base-200 bg-white px-3 py-2 dark:border-base-700 dark:bg-base-900">
                                        <div class="text-xs uppercase tracking-wider text-base-400 dark:text-base-500">{% trans "Revenue" %}</div>
                                        <div class="mt-1 text-sm font-semibold text-base-900 dark:text-base-100" x-text="compactCurrency(day.revenue)"></div>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>

                <div class="overflow-hidden rounded-3xl border border-base-200/80 bg-white shadow-sm dark:border-base-700 dark:bg-base-900 lg:col-span-1">
                    <div class="flex items-center justify-between gap-3 border-b border-base-200/80 px-5 py-4 dark:border-base-700">
                        <div>
                            <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Recent complaints" %}</div>
                            <div class="mt-1 text-lg font-semibold text-base-900 dark:text-base-50">{% trans "Priority queue" %}</div>
                        </div>
                        <a href="/admin/complaints/complaints/" class="text-xs font-medium text-primary-600 hover:text-primary-700 dark:text-primary-400 dark:hover:text-primary-300">
                            {% trans "View all" %}
                        </a>
                    </div>
                    <div class="divide-y divide-base-100 dark:divide-base-800">
                        <template x-for="(c, i) in complaints.slice(0, 5)" :key="i">
                            <a :href="'/admin/complaints/complaints/' + c.id + '/change/'"
                               class="flex items-center gap-3 px-5 py-4 transition-colors hover:bg-base-50 dark:hover:bg-base-800/40">
                                <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-2xl border border-rose-200 bg-rose-50 text-rose-600 dark:border-rose-900 dark:bg-rose-950/40 dark:text-rose-300">
                                    <span class="material-symbols-outlined text-base leading-none">warning</span>
                                </div>
                                <div class="min-w-0 flex-1">
                                    <div class="truncate text-sm font-semibold text-base-900 dark:text-base-100" x-text="c.complainant"></div>
                                    <div class="mt-1 text-xs text-base-400 dark:text-base-500" x-text="c.created_at"></div>
                                </div>
                                <span class="rounded-full px-3 py-1 text-xs font-semibold capitalize"
                                      :class="complaintBadgeClass(c.status)"
                                      x-text="humanizeStatus(c.status)"></span>
                            </a>
                        </template>
                        <template x-if="complaints.length === 0">
                            <div class="py-12 text-center text-sm text-base-400 dark:text-base-500">{% trans "No complaints" %}</div>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function dashboard() {
    return {
        loading: true,
        kpis: null,
        chart: [],
        orders: [],
        complaints: [],
        maxOrders: 1,
        maxRevenue: 1,

        async init() {
            try {
                const resp = await fetch('/admin/dashboard/data/');
                if (!resp.ok) return;
                const d = await resp.json();
                this.kpis = d.kpis;
                this.chart = d.chart || [];
                this.orders = d.recent_orders || [];
                this.complaints = d.recent_complaints || [];
                this.maxOrders = Math.max(1, ...this.chart.map((r) => r.orders || 0));
                this.maxRevenue = Math.max(1, ...this.chart.map((r) => r.revenue || 0));
            } finally {
                this.loading = false;
            }
        },

        leftPanelItems() {
            return [
                { key: 'revenue_today', label: '{% trans "Revenue today" %}', caption: '{% trans "Current day gross volume" %}', value: this.kpis.revenue_today, icon: 'payments', tone: 'emerald', format: 'currency' },
                { key: 'orders_today', label: '{% trans "Orders today" %}', caption: '{% trans "Incoming order count" %}', value: this.kpis.orders_today, icon: 'receipt_long', tone: 'sky' },
                { key: 'orders_active', label: '{% trans "Active orders" %}', caption: '{% trans "Still in fulfillment" %}', value: this.kpis.orders_active, icon: 'local_shipping', tone: 'sky' },
                { key: 'open_complaints', label: '{% trans "Open complaints" %}', caption: '{% trans "Customer-side urgent queue" %}', value: this.kpis.open_complaints, icon: 'report_problem', tone: 'rose', href: '/admin/complaints/complaints/', variant: 'action' },
                { key: 'pending_sellers', label: '{% trans "Pending sellers" %}', caption: '{% trans "Seller approvals waiting" %}', value: this.kpis.pending_sellers, icon: 'storefront', tone: 'amber', href: '/admin/authentication/sellerusers/' , variant: 'action' },
                { key: 'pending_compliance', label: '{% trans "Pending docs" %}', caption: '{% trans "Documents to review" %}', value: this.kpis.pending_compliance, icon: 'folder_open', tone: 'amber', href: '/admin/compliance/', variant: 'action' },
            ];
        },

        activityFeed() {
            return [
                { key: 'orders', title: '{% trans "Orders moving now" %}', text: '{% trans "Active delivery and preparation load" %}', value: this.fmt(this.kpis.orders_active), icon: 'local_shipping', tone: 'sky' },
                { key: 'complaints', title: '{% trans "Attention needed" %}', text: '{% trans "Open customer complaints in queue" %}', value: this.fmt(this.kpis.open_complaints), icon: 'priority_high', tone: 'rose' },
                { key: 'seller_reviews', title: '{% trans "Seller review lane" %}', text: '{% trans "Profiles waiting for decision" %}', value: this.fmt(this.kpis.pending_sellers), icon: 'store', tone: 'amber' },
                { key: 'doc_reviews', title: '{% trans "Compliance lane" %}', text: '{% trans "Documents still pending" %}', value: this.fmt(this.kpis.pending_compliance), icon: 'inventory_2', tone: 'amber' },
            ];
        },

        fmt(n) {
            if (n === null || n === undefined) return '—';
            return new Intl.NumberFormat('tr-TR').format(n);
        },

        currency(n) {
            if (n === null || n === undefined) return '—';
            return '₺' + new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
        },

        compactCurrency(n) {
            if (n === null || n === undefined) return '—';
            if (n >= 1000) return '₺' + (n / 1000).toFixed(1) + 'k';
            return '₺' + Math.round(n);
        },

        humanizeStatus(status) {
            if (!status) return '—';
            return status.replaceAll('_', ' ');
        },

        complaintBadgeClass(status) {
            if (status === 'open') return 'bg-rose-50 text-rose-700 border border-rose-200 dark:bg-rose-950/40 dark:text-rose-300 dark:border-rose-800';
            if (status === 'in_review') return 'bg-amber-50 text-amber-700 border border-amber-200 dark:bg-amber-950/40 dark:text-amber-300 dark:border-amber-800';
            return 'bg-base-100 text-base-600 border border-base-200 dark:bg-base-800 dark:text-base-400 dark:border-base-700';
        },

        barWidth(val, max) {
            if (!max || max === 0) return 0;
            return Math.max(8, Math.round((val / max) * 100));
        },

        shortDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' });
        },

        ordersPoints() {
            if (!this.chart.length) return [];
            return this.chart.map((day, index) => {
                const x = 16 + (index * (288 / Math.max(1, this.chart.length - 1)));
                const ratio = this.maxOrders ? (day.orders || 0) / this.maxOrders : 0;
                const y = 96 - (ratio * 72);
                return { x, y };
            });
        },

        ordersLine() {
            return this.ordersPoints().map((point) => `${point.x},${point.y}`).join(' ');
        },

        ordersLineShadow() {
            return this.ordersPoints().map((point) => `${point.x},${point.y + 1}`).join(' ');
        },

        heatColor(val, max) {
            const ratio = max ? (val || 0) / max : 0;
            if (ratio > 0.75) return 'linear-gradient(135deg, #0f766e, #14b8a6)';
            if (ratio > 0.45) return 'linear-gradient(135deg, #0369a1, #38bdf8)';
            if (ratio > 0.15) return 'linear-gradient(135deg, #334155, #64748b)';
            return 'linear-gradient(135deg, #1e293b, #334155)';
        },
    };
}
</script>
{% endblock %}
