{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<style>
    .dashboard-shell {
        position: relative;
    }

    .dashboard-shell::before {
        content: "";
        position: absolute;
        inset: -16px 0 auto;
        height: 160px;
        pointer-events: none;
        background:
            radial-gradient(circle at top left, rgba(14, 165, 233, 0.08), transparent 36%),
            radial-gradient(circle at top right, rgba(16, 185, 129, 0.08), transparent 30%);
        filter: blur(10px);
    }
</style>

<div x-data="dashboard()" x-init="init()" class="dashboard-shell space-y-4">
    <template x-if="loading">
        <div class="flex items-center justify-center gap-3 py-20 text-base-400 dark:text-base-500">
            <span class="material-symbols-outlined text-3xl animate-spin leading-none">progress_activity</span>
            <span class="text-sm">{% trans "Loading dashboard…" %}</span>
        </div>
    </template>

    <template x-if="!loading && kpis">
        <div class="relative space-y-4">
            <div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
                <template x-for="alert in opsAlerts()" :key="alert.key">
                    <a :href="alert.href"
                       class="rounded-2xl border px-4 py-3 transition-colors hover:bg-base-50 dark:hover:bg-base-800/40"
                       :class="alert.tone === 'rose'
                           ? 'border-rose-200 dark:border-rose-900'
                           : alert.tone === 'amber'
                               ? 'border-amber-200 dark:border-amber-900'
                               : 'border-sky-200 dark:border-sky-900'">
                        <div class="flex items-center justify-between gap-3">
                            <div class="min-w-0">
                                <div class="text-xs font-semibold uppercase tracking-widest text-base-500 dark:text-base-400" x-text="alert.label"></div>
                                <div class="mt-1 text-2xl font-semibold text-base-900 dark:text-base-100" x-text="fmt(alert.value)"></div>
                            </div>
                            <span class="material-symbols-outlined text-lg"
                                  :class="alert.tone === 'rose'
                                      ? 'text-rose-600 dark:text-rose-300'
                                      : alert.tone === 'amber'
                                          ? 'text-amber-600 dark:text-amber-300'
                                          : 'text-sky-600 dark:text-sky-300'"
                                  x-text="alert.icon"></span>
                        </div>
                    </a>
                </template>
            </div>

            <div class="grid gap-4 lg:grid-cols-4">
                <div class="overflow-hidden rounded-3xl border border-base-200 bg-white shadow-sm dark:border-base-700 dark:bg-base-900 lg:col-span-1">
                    <div class="border-b border-base-200 px-5 py-4 dark:border-base-700">
                        <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Control center" %}</div>
                        <h1 class="mt-1 text-2xl font-semibold tracking-tight text-base-900 dark:text-base-50">{% trans "Homepage dashboard" %}</h1>
                        <div class="mt-2 text-xs text-base-500 dark:text-base-400">{% trans "Last update" %}: <span x-text="relativeLastUpdated()"></span></div>
                    </div>
                    <div class="space-y-2 px-4 py-4">
                        <template x-for="m in coreMetrics()" :key="m.key">
                            <div class="flex items-center justify-between gap-3 rounded-xl border border-base-200 px-3 py-2.5 dark:border-base-700">
                                <div class="min-w-0">
                                    <div class="text-sm font-medium text-base-700 dark:text-base-200" x-text="m.label"></div>
                                </div>
                                <div class="shrink-0 text-right text-xl font-semibold text-base-900 dark:text-base-100"
                                     x-text="m.format === 'currency' ? currency(m.value) : fmt(m.value)"></div>
                            </div>
                        </template>
                    </div>
                    <div class="border-t border-base-100 px-4 py-3 dark:border-base-800">
                        <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Quick actions" %}</div>
                        <div class="mt-2 space-y-2">
                            <template x-for="a in quickActions()" :key="a.key">
                                <a :href="a.href" class="flex items-center justify-between rounded-xl px-3 py-2 transition-colors hover:bg-base-50 dark:hover:bg-base-800/40">
                                    <span class="text-sm text-base-700 dark:text-base-200" x-text="a.label"></span>
                                    <span class="rounded-full px-2.5 py-1 text-xs font-semibold"
                                          :class="a.tone === 'rose'
                                              ? 'bg-rose-50 text-rose-700 dark:bg-rose-950/40 dark:text-rose-300'
                                              : 'bg-amber-50 text-amber-700 dark:bg-amber-950/40 dark:text-amber-300'"
                                          x-text="fmt(a.value)"></span>
                                </a>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="overflow-hidden rounded-3xl border border-base-200 bg-white shadow-sm dark:border-base-700 dark:bg-base-900 lg:col-span-2">
                    <div class="flex items-center justify-between gap-3 border-b border-base-200 px-5 py-4 dark:border-base-700">
                        <div>
                            <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Realtime pulse" %}</div>
                            <div class="mt-1 text-lg font-semibold text-base-900 dark:text-base-50">{% trans "Orders and revenue flow" %}</div>
                        </div>
                    </div>
                    <div class="grid gap-4 p-4 md:grid-cols-2">
                        <div class="rounded-2xl border border-base-200 p-4 dark:border-base-700">
                            <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Orders trend" %}</div>
                            <div class="mt-1 text-2xl font-semibold text-base-900 dark:text-base-100" x-text="fmt(kpis.orders_today)"></div>
                            <svg viewBox="0 0 320 120" class="mt-3 h-28 w-full">
                                <polyline fill="none" stroke="#38bdf8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" :points="ordersLine()"></polyline>
                                <template x-for="point in ordersPoints()" :key="point.x">
                                    <circle :cx="point.x" :cy="point.y" r="3.5" fill="#38bdf8"></circle>
                                </template>
                            </svg>
                        </div>

                        <div class="rounded-2xl border border-base-200 p-4 dark:border-base-700">
                            <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Revenue trend" %}</div>
                            <div class="mt-1 text-2xl font-semibold text-base-900 dark:text-base-100" x-text="currency(kpis.revenue_today)"></div>
                            <div class="mt-3 space-y-2">
                                <template x-for="(day, i) in chart" :key="i">
                                    <div class="grid grid-cols-12 items-center gap-2">
                                        <div class="col-span-3 text-xs text-base-500 dark:text-base-400" x-text="shortDate(day.date)"></div>
                                        <div class="col-span-6 h-2 overflow-hidden rounded-full bg-base-100 dark:bg-base-800">
                                            <div class="h-full rounded-full bg-emerald-500" :style="'width:' + barWidth(day.revenue, maxRevenue) + '%'"></div>
                                        </div>
                                        <div class="col-span-3 text-right text-xs font-medium text-base-600 dark:text-base-300" x-text="compactCurrency(day.revenue)"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="overflow-hidden rounded-3xl border border-base-200 bg-white shadow-sm dark:border-base-700 dark:bg-base-900 lg:col-span-1">
                    <div class="border-b border-base-200 px-5 py-4 dark:border-base-700">
                        <div class="text-xs font-semibold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Live activity" %}</div>
                        <div class="mt-1 text-lg font-semibold text-base-900 dark:text-base-50">{% trans "Important feed" %}</div>
                    </div>
                    <div class="space-y-2 px-4 py-4">
                        <template x-for="entry in activityFeed()" :key="entry.key">
                            <a :href="entry.href"
                               class="flex items-center justify-between gap-3 rounded-xl border border-base-200 px-3 py-2.5 transition-colors hover:bg-base-50 dark:border-base-700 dark:hover:bg-base-800/40">
                                <div class="min-w-0 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-base text-base-500 dark:text-base-400" x-text="entry.icon"></span>
                                    <div class="truncate text-sm font-medium text-base-800 dark:text-base-100" x-text="entry.title"></div>
                                </div>
                                <div class="shrink-0 text-right text-lg font-semibold text-base-900 dark:text-base-100" x-text="entry.value"></div>
                            </a>
                        </template>
                    </div>
                    <div class="border-t border-base-100 px-5 py-3 text-xs font-semibold uppercase tracking-widest text-base-400 dark:border-base-800 dark:text-base-500">
                        {% trans "Recent complaints" %}
                    </div>
                    <div class="divide-y divide-base-100 dark:divide-base-800">
                        <template x-for="(c, i) in complaints.slice(0, 4)" :key="i">
                            <a :href="'/admin/complaints/complaints/' + c.id + '/change/'"
                               class="flex items-center gap-3 px-5 py-3 transition-colors hover:bg-base-50 dark:hover:bg-base-800/40">
                                <div class="min-w-0 flex-1">
                                    <div class="truncate text-sm font-semibold text-base-900 dark:text-base-100" x-text="c.complainant"></div>
                                    <div class="mt-0.5 text-xs text-base-400 dark:text-base-500" x-text="c.created_at"></div>
                                </div>
                                <span class="rounded-full px-2.5 py-1 text-xs font-semibold capitalize"
                                      :class="complaintBadgeClass(c.status)"
                                      x-text="humanizeStatus(c.status)"></span>
                            </a>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>

<script>
function dashboard() {
    return {
        loading: true,
        kpis: null,
        ops: null,
        chart: [],
        complaints: [],
        maxOrders: 1,
        maxRevenue: 1,

        async init() {
            try {
                const resp = await fetch('/admin/dashboard/data/');
                if (!resp.ok) return;
                const d = await resp.json();
                this.kpis = d.kpis;
                this.ops = d.ops || this.defaultOps();
                this.chart = d.chart || [];
                this.complaints = d.recent_complaints || [];
                this.maxOrders = Math.max(1, ...this.chart.map((r) => r.orders || 0));
                this.maxRevenue = Math.max(1, ...this.chart.map((r) => r.revenue || 0));
            } finally {
                this.loading = false;
            }
        },

        defaultOps() {
            return {
                failed_payments_24h: 0,
                open_disputes: 0,
                overdue_active_orders: 0,
                high_priority_complaints: 0,
                stale_pending_docs: 0,
                low_rating_reviews_7d: 0,
                last_updated_at: null,
            };
        },

        coreMetrics() {
            return [
                { key: 'revenue_today', label: '{% trans "Revenue today" %}', value: this.kpis.revenue_today, format: 'currency' },
                { key: 'orders_today', label: '{% trans "Orders today" %}', value: this.kpis.orders_today },
                { key: 'orders_active', label: '{% trans "Active orders" %}', value: this.kpis.orders_active },
            ];
        },

        quickActions() {
            return [
                { key: 'complaints', label: '{% trans "Open complaints" %}', value: this.kpis.open_complaints, tone: 'rose', href: '/admin/complaints/complaints/' },
                { key: 'sellers', label: '{% trans "Pending sellers" %}', value: this.kpis.pending_sellers, tone: 'amber', href: '/admin/authentication/sellerusers/' },
                { key: 'docs', label: '{% trans "Pending docs" %}', value: this.kpis.pending_compliance, tone: 'amber', href: '/admin/compliance/sellercompliancedocuments/' },
            ];
        },

        activityFeed() {
            return [
                { key: 'orders', title: '{% trans "Orders moving now" %}', value: this.fmt(this.kpis.orders_active), icon: 'local_shipping', href: '/admin/orders/orders/' },
                { key: 'critical_complaints', title: '{% trans "Critical complaints" %}', value: this.fmt(this.ops.high_priority_complaints), icon: 'priority_high', href: '/admin/complaints/complaints/' },
                { key: 'failed_payments', title: '{% trans "Failed payments (24h)" %}', value: this.fmt(this.ops.failed_payments_24h), icon: 'payments', href: '/admin/orders/orders/?payment_completed__exact=0' },
                { key: 'stale_docs', title: '{% trans "Stale pending docs" %}', value: this.fmt(this.ops.stale_pending_docs), icon: 'inventory_2', href: '/admin/compliance/sellercompliancedocuments/' },
            ];
        },

        opsAlerts() {
            return [
                { key: 'high_priority_complaints', label: '{% trans "Critical complaints" %}', value: this.ops.high_priority_complaints, icon: 'emergency', tone: 'rose', href: '/admin/complaints/complaints/' },
                { key: 'failed_payments_24h', label: '{% trans "Failed payments (24h)" %}', value: this.ops.failed_payments_24h, icon: 'payments', tone: 'amber', href: '/admin/orders/orders/?payment_completed__exact=0' },
                { key: 'overdue_active_orders', label: '{% trans "Overdue active orders" %}', value: this.ops.overdue_active_orders, icon: 'schedule', tone: 'amber', href: '/admin/orders/orders/' },
                { key: 'low_rating_reviews_7d', label: '{% trans "Low rating reviews (7d)" %}', value: this.ops.low_rating_reviews_7d, icon: 'star', tone: 'sky', href: '/admin/orders/reviews/' },
            ];
        },

        fmt(n) {
            if (n === null || n === undefined) return '—';
            return new Intl.NumberFormat('tr-TR').format(n);
        },

        currency(n) {
            if (n === null || n === undefined) return '—';
            return '₺' + new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
        },

        compactCurrency(n) {
            if (n === null || n === undefined) return '—';
            if (n >= 1000) return '₺' + (n / 1000).toFixed(1) + 'k';
            return '₺' + Math.round(n);
        },

        humanizeStatus(status) {
            if (!status) return '—';
            return status.replaceAll('_', ' ');
        },

        complaintBadgeClass(status) {
            if (status === 'open') return 'bg-rose-50 text-rose-700 border border-rose-200 dark:bg-rose-950/40 dark:text-rose-300 dark:border-rose-800';
            if (status === 'in_review') return 'bg-amber-50 text-amber-700 border border-amber-200 dark:bg-amber-950/40 dark:text-amber-300 dark:border-amber-800';
            return 'bg-base-100 text-base-600 border border-base-200 dark:bg-base-800 dark:text-base-400 dark:border-base-700';
        },

        barWidth(val, max) {
            if (!max || max === 0) return 0;
            return Math.max(8, Math.round((val / max) * 100));
        },

        shortDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' });
        },

        relativeLastUpdated() {
            if (!this.ops || !this.ops.last_updated_at) return '{% trans "just now" %}';
            const now = new Date();
            const stamp = new Date(this.ops.last_updated_at);
            const sec = Math.max(0, Math.floor((now.getTime() - stamp.getTime()) / 1000));
            if (sec < 60) return `${sec}s`;
            const min = Math.floor(sec / 60);
            if (min < 60) return `${min}m`;
            const hr = Math.floor(min / 60);
            return `${hr}h`;
        },

        ordersPoints() {
            if (!this.chart.length) return [];
            return this.chart.map((day, index) => {
                const x = 16 + (index * (288 / Math.max(1, this.chart.length - 1)));
                const ratio = this.maxOrders ? (day.orders || 0) / this.maxOrders : 0;
                const y = 96 - (ratio * 72);
                return { x, y };
            });
        },

        ordersLine() {
            return this.ordersPoints().map((point) => `${point.x},${point.y}`).join(' ');
        },
    };
}
</script>
{% endblock %}
