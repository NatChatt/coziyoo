{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div
    x-data="dashboard()"
    x-init="init()"
    class="space-y-6"
>

    {# ── Loading state ── #}
    <template x-if="loading">
        <div class="flex items-center justify-center py-20 gap-3 text-base-400 dark:text-base-500">
            <span class="material-symbols-outlined text-3xl animate-spin leading-none">progress_activity</span>
            <span class="text-sm">{% trans "Loading dashboard…" %}</span>
        </div>
    </template>

    <template x-if="!loading && kpis">

        <div class="space-y-6">

            {# ── KPI Cards ── #}
            <div class="grid grid-cols-2 gap-3 sm:grid-cols-3 lg:grid-cols-6">

                {# Total Buyers — blue #}
                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800">
                    <span class="material-symbols-outlined text-blue-500 dark:text-blue-400 text-2xl leading-none">group</span>
                    <div>
                        <div class="text-[10px] font-medium text-blue-600 dark:text-blue-300 uppercase tracking-wide whitespace-nowrap">{% trans "Total Buyers" %}</div>
                        <div class="text-2xl font-bold text-blue-800 dark:text-blue-100" x-text="fmt(kpis.total_buyers)"></div>
                    </div>
                </div>

                {# New Buyers Month — blue lighter #}
                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-blue-50 dark:bg-blue-950/40 border border-blue-200 dark:border-blue-800">
                    <span class="material-symbols-outlined text-blue-500 dark:text-blue-400 text-2xl leading-none">person_add</span>
                    <div>
                        <div class="text-[10px] font-medium text-blue-600 dark:text-blue-300 uppercase tracking-wide whitespace-nowrap">{% trans "New (30d)" %}</div>
                        <div class="text-2xl font-bold text-blue-800 dark:text-blue-100" x-text="fmt(kpis.new_buyers_month)"></div>
                    </div>
                </div>

                {# Active Sellers — emerald #}
                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-800">
                    <span class="material-symbols-outlined text-emerald-500 dark:text-emerald-400 text-2xl leading-none">storefront</span>
                    <div>
                        <div class="text-[10px] font-medium text-emerald-600 dark:text-emerald-300 uppercase tracking-wide whitespace-nowrap">{% trans "Active Sellers" %}</div>
                        <div class="text-2xl font-bold text-emerald-800 dark:text-emerald-100" x-text="fmt(kpis.active_sellers)"></div>
                    </div>
                </div>

                {# Orders Today — amber #}
                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-amber-50 dark:bg-amber-950/40 border border-amber-200 dark:border-amber-800">
                    <span class="material-symbols-outlined text-amber-500 dark:text-amber-400 text-2xl leading-none">receipt_long</span>
                    <div>
                        <div class="text-[10px] font-medium text-amber-600 dark:text-amber-300 uppercase tracking-wide whitespace-nowrap">{% trans "Orders Today" %}</div>
                        <div class="text-2xl font-bold text-amber-800 dark:text-amber-100" x-text="fmt(kpis.orders_today)"></div>
                    </div>
                </div>

                {# Revenue Today — emerald #}
                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-800">
                    <span class="material-symbols-outlined text-emerald-500 dark:text-emerald-400 text-2xl leading-none">payments</span>
                    <div>
                        <div class="text-[10px] font-medium text-emerald-600 dark:text-emerald-300 uppercase tracking-wide whitespace-nowrap">{% trans "Revenue Today" %}</div>
                        <div class="text-2xl font-bold text-emerald-800 dark:text-emerald-100" x-text="currency(kpis.revenue_today)"></div>
                    </div>
                </div>

                {# Open Complaints — rose #}
                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-800">
                    <span class="material-symbols-outlined text-rose-500 dark:text-rose-400 text-2xl leading-none">report_problem</span>
                    <div>
                        <div class="text-[10px] font-medium text-rose-600 dark:text-rose-300 uppercase tracking-wide whitespace-nowrap">{% trans "Open Complaints" %}</div>
                        <div class="text-2xl font-bold text-rose-800 dark:text-rose-100" x-text="fmt(kpis.open_complaints)"></div>
                    </div>
                </div>

            </div>

            {# ── Secondary KPI row ── #}
            <div class="grid grid-cols-2 gap-3 sm:grid-cols-4">

                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-amber-50 dark:bg-amber-950/40 border border-amber-200 dark:border-amber-800">
                    <span class="material-symbols-outlined text-amber-500 dark:text-amber-400 text-xl leading-none">pending_actions</span>
                    <div>
                        <div class="text-[10px] font-medium text-amber-600 dark:text-amber-300 uppercase tracking-wide whitespace-nowrap">{% trans "Active Orders" %}</div>
                        <div class="text-xl font-bold text-amber-800 dark:text-amber-100" x-text="fmt(kpis.orders_active)"></div>
                    </div>
                </div>

                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-emerald-50 dark:bg-emerald-950/40 border border-emerald-200 dark:border-emerald-800">
                    <span class="material-symbols-outlined text-emerald-500 dark:text-emerald-400 text-xl leading-none">trending_up</span>
                    <div>
                        <div class="text-[10px] font-medium text-emerald-600 dark:text-emerald-300 uppercase tracking-wide whitespace-nowrap">{% trans "Revenue (Month)" %}</div>
                        <div class="text-xl font-bold text-emerald-800 dark:text-emerald-100" x-text="currency(kpis.revenue_month)"></div>
                    </div>
                </div>

                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-800">
                    <span class="material-symbols-outlined text-rose-500 dark:text-rose-400 text-xl leading-none">assignment_late</span>
                    <div>
                        <div class="text-[10px] font-medium text-rose-600 dark:text-rose-300 uppercase tracking-wide whitespace-nowrap">{% trans "Pending Sellers" %}</div>
                        <div class="text-xl font-bold text-rose-800 dark:text-rose-100" x-text="fmt(kpis.pending_sellers)"></div>
                    </div>
                </div>

                <div class="rounded-xl px-4 py-3 flex items-center gap-3 bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-800">
                    <span class="material-symbols-outlined text-rose-500 dark:text-rose-400 text-xl leading-none">folder_open</span>
                    <div>
                        <div class="text-[10px] font-medium text-rose-600 dark:text-rose-300 uppercase tracking-wide whitespace-nowrap">{% trans "Pending Docs" %}</div>
                        <div class="text-xl font-bold text-rose-800 dark:text-rose-100" x-text="fmt(kpis.pending_compliance)"></div>
                    </div>
                </div>

            </div>

            {# ── Chart + Recent activity side-by-side ── #}
            <div class="grid grid-cols-1 gap-6 lg:grid-cols-5">

                {# ── 7-day sparkline chart ── #}
                <div class="lg:col-span-3 rounded-xl border border-base-200 dark:border-base-700 bg-white dark:bg-base-900 overflow-hidden">
                    <div class="px-5 py-3 border-b border-base-200 dark:border-base-700 flex items-center gap-2">
                        <span class="material-symbols-outlined text-base text-base-400 dark:text-base-500 leading-none">bar_chart</span>
                        <span class="text-xs font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Last 7 Days" %}</span>
                    </div>
                    <div class="p-4">
                        {# Legend #}
                        <div class="flex items-center gap-4 mb-3">
                            <span class="flex items-center gap-1.5 text-xs text-base-500 dark:text-base-400">
                                <span class="w-3 h-3 rounded-sm bg-primary-500 inline-block"></span>{% trans "Orders" %}
                            </span>
                            <span class="flex items-center gap-1.5 text-xs text-base-500 dark:text-base-400">
                                <span class="w-3 h-3 rounded-sm bg-emerald-500 inline-block"></span>{% trans "Revenue (₺)" %}
                            </span>
                        </div>
                        {# Bar chart — orders #}
                        <div class="space-y-2">
                            <template x-for="(day, i) in chart" :key="i">
                                <div class="flex items-center gap-2">
                                    <div class="w-16 text-[10px] text-base-400 dark:text-base-500 text-right shrink-0" x-text="fmtDate(day.date)"></div>
                                    <div class="flex-1 flex items-center gap-1.5">
                                        {# Orders bar #}
                                        <div class="h-4 rounded bg-primary-500/20 dark:bg-primary-500/10 flex-1 overflow-hidden relative">
                                            <div class="h-full rounded bg-primary-500 transition-all duration-500"
                                                 :style="'width:' + barWidth(day.orders, maxOrders) + '%'"></div>
                                            <span class="absolute right-1.5 top-0 bottom-0 flex items-center text-[10px] font-semibold text-primary-700 dark:text-primary-300"
                                                  x-text="day.orders > 0 ? day.orders : ''"></span>
                                        </div>
                                        {# Revenue bar #}
                                        <div class="h-4 rounded bg-emerald-500/20 dark:bg-emerald-500/10 w-28 overflow-hidden relative shrink-0">
                                            <div class="h-full rounded bg-emerald-500 transition-all duration-500"
                                                 :style="'width:' + barWidth(day.revenue, maxRevenue) + '%'"></div>
                                            <span class="absolute right-1.5 top-0 bottom-0 flex items-center text-[10px] font-semibold text-emerald-700 dark:text-emerald-300"
                                                  x-text="day.revenue > 0 ? '₺' + shortNum(day.revenue) : ''"></span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>

                {# ── Recent Complaints ── #}
                <div class="lg:col-span-2 rounded-xl border border-base-200 dark:border-base-700 bg-white dark:bg-base-900 overflow-hidden flex flex-col">
                    <div class="px-5 py-3 border-b border-base-200 dark:border-base-700 flex items-center justify-between gap-2">
                        <div class="flex items-center gap-2">
                            <span class="material-symbols-outlined text-base text-rose-400 dark:text-rose-500 leading-none">report_problem</span>
                            <span class="text-xs font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Recent Complaints" %}</span>
                        </div>
                        <a href="/admin/complaints/complaints/" class="text-[10px] text-primary-600 dark:text-primary-400 hover:underline whitespace-nowrap">{% trans "View all" %}</a>
                    </div>
                    <div class="divide-y divide-base-100 dark:divide-base-800 flex-1">
                        <template x-for="(c, i) in complaints" :key="i">
                            <a :href="'/admin/complaints/complaints/' + c.id + '/change/'"
                               class="flex items-center gap-3 px-4 py-3 hover:bg-base-100/40 dark:hover:bg-base-700/30 transition-colors">
                                <div class="w-8 h-8 rounded-lg bg-rose-50 dark:bg-rose-950/40 border border-rose-200 dark:border-rose-800 flex items-center justify-center shrink-0">
                                    <span class="material-symbols-outlined text-sm text-rose-500 leading-none">warning</span>
                                </div>
                                <div class="min-w-0 flex-1">
                                    <div class="text-xs font-semibold text-base-800 dark:text-base-100 truncate" x-text="c.complainant"></div>
                                    <div class="text-[10px] text-base-400 dark:text-base-500 mt-0.5" x-text="c.created_at"></div>
                                </div>
                                <span class="text-[10px] px-2 py-0.5 rounded-full font-medium shrink-0"
                                      :class="{
                                          'bg-rose-50 text-rose-700 border border-rose-200 dark:bg-rose-950/40 dark:text-rose-300 dark:border-rose-800': c.status === 'open',
                                          'bg-amber-50 text-amber-700 border border-amber-200 dark:bg-amber-950/40 dark:text-amber-300 dark:border-amber-800': c.status === 'in_review',
                                          'bg-base-100 text-base-500 border border-base-200 dark:bg-base-800 dark:text-base-400 dark:border-base-700': c.status !== 'open' && c.status !== 'in_review'
                                      }"
                                      x-text="c.status">
                                </span>
                            </a>
                        </template>
                        <template x-if="complaints.length === 0">
                            <div class="py-10 text-center text-sm text-base-400 dark:text-base-500">{% trans "No complaints" %}</div>
                        </template>
                    </div>
                </div>

            </div>

            {# ── Recent Orders ── #}
            <div class="rounded-xl border border-base-200 dark:border-base-700 bg-white dark:bg-base-900 overflow-hidden">
                <div class="px-5 py-3 border-b border-base-200 dark:border-base-700 flex items-center justify-between gap-2">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-base text-amber-400 dark:text-amber-500 leading-none">receipt_long</span>
                        <span class="text-xs font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Recent Orders" %}</span>
                    </div>
                    <a href="/admin/orders/orders/" class="text-[10px] text-primary-600 dark:text-primary-400 hover:underline whitespace-nowrap">{% trans "View all" %}</a>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-sm min-w-[640px]">
                        <thead>
                            <tr class="border-b border-base-200 dark:border-base-700 bg-base-50 dark:bg-base-800/50">
                                <th class="py-2.5 px-4 text-left text-[10px] font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "ID" %}</th>
                                <th class="py-2.5 px-4 text-left text-[10px] font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Buyer" %}</th>
                                <th class="py-2.5 px-4 text-left text-[10px] font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Seller" %}</th>
                                <th class="py-2.5 px-4 text-left text-[10px] font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Status" %}</th>
                                <th class="py-2.5 px-4 text-right text-[10px] font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Total" %}</th>
                                <th class="py-2.5 px-4 text-left text-[10px] font-bold uppercase tracking-widest text-base-400 dark:text-base-500">{% trans "Date" %}</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-base-100 dark:divide-base-800">
                            <template x-for="(o, i) in orders" :key="i">
                                <tr class="hover:bg-base-100/40 dark:hover:bg-base-700/30 transition-colors cursor-pointer"
                                    @click="window.location='/admin/orders/orders/' + o.id + '/change/'">
                                    <td class="py-3 px-4 font-mono text-xs text-base-400" x-text="o.id_short + '…'"></td>
                                    <td class="py-3 px-4 text-xs font-medium text-base-800 dark:text-base-100 truncate max-w-[140px]" x-text="o.buyer"></td>
                                    <td class="py-3 px-4 text-xs text-base-500 dark:text-base-400 truncate max-w-[140px]" x-text="o.seller"></td>
                                    <td class="py-3 px-4">
                                        <span class="text-[10px] px-2 py-0.5 rounded-full font-medium"
                                              :class="{
                                                  'bg-emerald-50 text-emerald-700 border border-emerald-200 dark:bg-emerald-950/40 dark:text-emerald-300 dark:border-emerald-800': o.status === 'delivered',
                                                  'bg-amber-50 text-amber-700 border border-amber-200 dark:bg-amber-950/40 dark:text-amber-300 dark:border-amber-800': o.status === 'processing' || o.status === 'accepted',
                                                  'bg-blue-50 text-blue-700 border border-blue-200 dark:bg-blue-950/40 dark:text-blue-300 dark:border-blue-800': o.status === 'pending',
                                                  'bg-rose-50 text-rose-700 border border-rose-200 dark:bg-rose-950/40 dark:text-rose-300 dark:border-rose-800': o.status === 'cancelled',
                                                  'bg-base-100 text-base-500 border border-base-200 dark:bg-base-800 dark:text-base-400 dark:border-base-700': !['delivered','processing','accepted','pending','cancelled'].includes(o.status)
                                              }"
                                              x-text="o.status">
                                        </span>
                                    </td>
                                    <td class="py-3 px-4 text-xs font-medium text-right text-base-800 dark:text-base-100" x-text="'₺' + o.total.toFixed(2)"></td>
                                    <td class="py-3 px-4 text-[10px] text-base-400 whitespace-nowrap" x-text="o.created_at"></td>
                                </tr>
                            </template>
                            <template x-if="orders.length === 0">
                                <tr>
                                    <td colspan="6" class="py-10 text-center text-sm text-base-400 dark:text-base-500">{% trans "No orders" %}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </template>

</div>

<script>
function dashboard() {
    return {
        loading: true,
        kpis: null,
        chart: [],
        orders: [],
        complaints: [],
        maxOrders: 1,
        maxRevenue: 1,

        async init() {
            try {
                const resp = await fetch('/admin/dashboard/data/');
                if (!resp.ok) return;
                const d = await resp.json();
                this.kpis = d.kpis;
                this.chart = d.chart;
                this.orders = d.recent_orders;
                this.complaints = d.recent_complaints;
                this.maxOrders = Math.max(1, ...d.chart.map(r => r.orders));
                this.maxRevenue = Math.max(1, ...d.chart.map(r => r.revenue));
            } finally {
                this.loading = false;
            }
        },

        fmt(n) {
            if (n === null || n === undefined) return '—';
            return new Intl.NumberFormat('tr-TR').format(n);
        },

        currency(n) {
            if (n === null || n === undefined) return '—';
            return '₺' + new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(n);
        },

        shortNum(n) {
            if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
            return Math.round(n).toString();
        },

        barWidth(val, max) {
            if (!max || max === 0) return 0;
            return Math.max(2, Math.round((val / max) * 100));
        },

        fmtDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('tr-TR', { day: '2-digit', month: 'short' });
        },
    };
}
</script>
{% endblock %}
