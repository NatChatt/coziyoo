{% extends "admin/base_site.html" %}

{% block content %}
<style>
  .hero-simple-wrap {
    max-width: 760px;
    margin: 0 auto;
    padding: 16px;
  }
  .hero-simple-title {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .hero-simple-subtitle {
    font-size: 14px;
    color: #667085;
    margin-bottom: 14px;
  }
  .hero-simple-panel {
    border: 1px solid #d0d5dd;
    border-radius: 12px;
    background: #fff;
    padding: 14px;
  }
  .hero-field-label {
    font-size: 13px;
    font-weight: 700;
    color: #344054;
    margin-bottom: 8px;
  }
  .hero-dropzone {
    width: 100%;
    min-height: 58px;
    border: 1px dashed #98a2b3;
    border-radius: 10px;
    background: #f8fafc;
    color: #475467;
    font-size: 14px;
    padding: 12px;
    cursor: pointer;
    text-align: left;
  }
  .hero-actions {
    margin-top: 12px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .hero-btn-primary {
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 14px;
    background: #7f56d9;
    color: #fff;
    cursor: pointer;
  }
  .hero-preview {
    margin-top: 12px;
    border: 1px solid #d0d5dd;
    border-radius: 10px;
    overflow: hidden;
    background: #f2f4f7;
  }
  .hero-preview img {
    width: 100%;
    max-height: 280px;
    object-fit: cover;
    display: block;
  }
  .hero-help {
    margin-top: 10px;
    font-size: 12px;
    color: #667085;
  }
</style>

<div class="hero-simple-wrap">
  <div class="hero-simple-title">Home Hero</div>
  <div class="hero-simple-subtitle">Sadece resim ekle ve Yayınla.</div>

  <form method="post" id="home-hero-form" enctype="multipart/form-data" novalidate>
    {% csrf_token %}
    <input type="hidden" name="action" value="approve" />
    <input type="hidden" name="mobile_home_header_image_url" id="hero-image-url" value="{{ current_url_raw|default:'' }}" />
    <input type="hidden" name="mobile_home_header_edit_json" value="" />

    <div class="hero-simple-panel">
      <div class="hero-field-label">Telefon Home Hero Resmi</div>
      <input id="hero-file-input" name="mobile_home_header_file" type="file" accept="image/*" style="display:none" />
      <button type="button" id="hero-file-trigger" class="hero-dropzone">
        Dosya seçmek için tıkla
      </button>

      <div class="hero-preview" id="hero-preview-wrap" {% if not current_url %}style="display:none"{% endif %}>
        <img id="hero-preview-image" src="{{ current_url|default:'' }}" alt="Hero önizleme" />
      </div>

      <div class="hero-actions">
        <button type="submit" class="hero-btn-primary">Yayınla</button>
      </div>
      <div class="hero-help" id="hero-help-text">Resim seçtikten sonra Yayınla.</div>
    </div>
  </form>
</div>

<script>
(function () {
  var fileInput = document.getElementById('hero-file-input');
  var fileTrigger = document.getElementById('hero-file-trigger');
  var form = document.getElementById('home-hero-form');
  var imageUrlInput = document.getElementById('hero-image-url');
  var previewWrap = document.getElementById('hero-preview-wrap');
  var previewImage = document.getElementById('hero-preview-image');
  var helpText = document.getElementById('hero-help-text');

  fileTrigger.addEventListener('click', function () {
    fileInput.value = '';
    fileInput.click();
  });

  fileInput.addEventListener('change', function () {
    var file = fileInput.files && fileInput.files[0];
    if (!file) return;
    var objectUrl = URL.createObjectURL(file);
    previewImage.src = objectUrl;
    previewWrap.style.display = 'block';
    fileTrigger.textContent = file.name || 'Resim seçildi';
    helpText.textContent = 'Resim secildi. Simdi Yayinla.';
  });

  form.addEventListener('submit', function (e) {
    var hasNewFile = Boolean(fileInput.files && fileInput.files[0]);
    if (!hasNewFile && !imageUrlInput.value) {
      e.preventDefault();
      alert('Once bir gorsel secmelisin.');
      return;
    }
    helpText.textContent = 'Yayinlaniyor...';
  });
})();
</script>
{% endblock %}
