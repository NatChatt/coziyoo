{% extends "admin/change_form.html" %}
{% load i18n %}

{% block content %}
<div
  x-data="{
    detail: null,
    loading: true,
    error: null,
    orderId: '{{ original.pk }}',
    async fetchDetail() {
      try {
        const r = await fetch('/admin/orders/orders/' + this.orderId + '/live-detail/');
        if (!r.ok) throw new Error('HTTP ' + r.status);
        this.detail = await r.json();
      } catch(e) {
        this.error = e.message;
      } finally {
        this.loading = false;
      }
    },
    statusLabel(s) {
      const m = {
        pending_seller_approval: 'Satıcı Onayı Bekleniyor',
        pending_buyer_confirmation: 'Alıcı Onayı Bekleniyor',
        seller_approved: 'Satıcı Onayladı',
        awaiting_payment: 'Ödeme Bekleniyor',
        paid: 'Ödendi',
        preparing: 'Hazırlanıyor',
        ready: 'Hazır',
        in_delivery: 'Yolda',
        approaching: 'Yaklaşıyor',
        at_door: 'Kapıda',
        delivered: 'Teslim Edildi',
        completed: 'Tamamlandı',
        cancelled: 'İptal',
        rejected: 'Reddedildi',
      };
      return m[s] || s;
    },
    deliveryTypeLabel(t) {
      return t === 'delivery' ? 'Teslimat' : t === 'pickup' ? 'Gel Al' : (t || '-');
    },
  }"
  x-init="fetchDetail(); setInterval(() => fetchDetail(), 6000)"
>

  {# Live status banner #}
  <div class="mb-4 flex items-center justify-between rounded-xl border border-base-200 bg-white px-5 py-3 dark:border-base-700 dark:bg-base-800">
    <div class="flex items-center gap-3">
      <span class="material-symbols-outlined text-violet-500">shopping_bag</span>
      <div>
        <p class="text-xs text-base-500 dark:text-base-400">Sipariş Durumu</p>
        <p class="font-semibold text-base-900 dark:text-white" x-text="detail ? statusLabel(detail.status) : '...'"></p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="h-2 w-2 rounded-full bg-emerald-400 animate-pulse" x-show="!loading"></span>
      <span class="text-xs text-base-400" x-show="!loading">Canlı</span>
      <span class="text-xs text-base-400" x-show="loading">Yükleniyor…</span>
    </div>
  </div>

  {# Error state #}
  <div x-show="error" class="mb-4 rounded-xl border border-rose-200 bg-rose-50 px-5 py-3 text-sm text-rose-700 dark:border-rose-800 dark:bg-rose-950/40 dark:text-rose-300">
    Veri yüklenemedi: <span x-text="error"></span>
  </div>

  <template x-if="detail">
    <div class="space-y-4">

      {# ── Teslimat Akışı ── #}
      <div class="rounded-xl border border-base-200 bg-white px-5 py-4 dark:border-base-700 dark:bg-base-800">
        <p class="mb-3 text-sm font-semibold text-base-900 dark:text-white">Teslimat Akışı</p>
        <div class="grid grid-cols-2 gap-x-6 gap-y-2 text-sm">
          <div>
            <span class="text-xs text-base-500">Teslimat Tipi</span>
            <p class="font-medium text-base-900 dark:text-white" x-text="deliveryTypeLabel(detail.deliveryType)"></p>
          </div>
          <div>
            <span class="text-xs text-base-500">Aktif Tip</span>
            <p class="font-medium text-base-900 dark:text-white" x-text="deliveryTypeLabel(detail.activeDeliveryType)"></p>
          </div>
          <div>
            <span class="text-xs text-base-500">Talep Edilen</span>
            <p class="font-medium text-base-900 dark:text-white" x-text="deliveryTypeLabel(detail.requestedDeliveryType)"></p>
          </div>
          <div>
            <span class="text-xs text-base-500">Karar Durumu</span>
            <p class="font-medium text-base-900 dark:text-white" x-text="detail.sellerDecisionState || '-'"></p>
          </div>
          <template x-if="detail.sellerEtaMinutes">
            <div>
              <span class="text-xs text-base-500">Tahmini Süre</span>
              <p class="font-medium text-base-900 dark:text-white" x-text="detail.sellerEtaMinutes + ' dk'"></p>
            </div>
          </template>
          <template x-if="detail.sellerPromisedAt">
            <div>
              <span class="text-xs text-base-500">Söz Verilen Saat</span>
              <p class="font-medium text-base-900 dark:text-white" x-text="detail.sellerPromisedAt"></p>
            </div>
          </template>
        </div>

        {# Delivery address — shown only when confirmed #}
        <template x-if="detail.deliveryAddress && detail.deliveryAddress.addressLine">
          <div class="mt-3 rounded-lg border border-base-100 bg-base-50 px-4 py-3 dark:border-base-700 dark:bg-base-700/30">
            <p class="mb-1 text-xs font-semibold text-base-500 uppercase tracking-wide">Teslimat Adresi</p>
            <p class="text-sm font-medium text-base-900 dark:text-white" x-text="detail.deliveryAddress.title || ''"></p>
            <p class="text-sm text-base-700 dark:text-base-300" x-text="detail.deliveryAddress.addressLine"></p>
            <template x-if="detail.deliveryAddress.distanceKm != null">
              <p class="mt-1 text-xs text-base-500" x-text="detail.deliveryAddress.distanceKm + ' km uzakta'"></p>
            </template>
          </div>
        </template>

        {# Distance only (before agreement) #}
        <template x-if="detail.deliveryAddress && !detail.deliveryAddress.addressLine && detail.deliveryAddress.distanceKm != null">
          <div class="mt-3 text-xs text-base-500">
            <span class="material-symbols-outlined text-sm align-middle">near_me</span>
            Mesafe: <span class="font-semibold" x-text="detail.deliveryAddress.distanceKm + ' km'"></span>
            <span class="ml-1 text-amber-500">(adres anlaşma sonrası görünür)</span>
          </div>
        </template>

        <template x-if="detail.deliveryNote">
          <div class="mt-2 text-xs text-base-500">
            <span class="font-medium">Satıcı Notu:</span>
            <span x-text="detail.deliveryNote"></span>
          </div>
        </template>
      </div>

      {# ── Durum Adımları ── #}
      <div class="rounded-xl border border-base-200 bg-white px-5 py-4 dark:border-base-700 dark:bg-base-800">
        <p class="mb-3 text-sm font-semibold text-base-900 dark:text-white">Teslimat Adımları</p>
        <div class="flex flex-wrap gap-2">
          <template x-for="step in detail.timeline" :key="step.status">
            <div
              class="flex items-center gap-1.5 rounded-full px-3 py-1 text-xs font-medium"
              :class="step.reached
                ? 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900/40 dark:text-emerald-300'
                : 'bg-base-100 text-base-400 dark:bg-base-700 dark:text-base-500'"
            >
              <span
                class="material-symbols-outlined text-sm"
                :class="step.reached ? 'text-emerald-500' : 'text-base-400'"
                x-text="step.reached ? 'check_circle' : 'radio_button_unchecked'"
              ></span>
              <span x-text="step.label"></span>
            </div>
          </template>
        </div>
      </div>

      {# ── PIN / Teslimat Kanıtı ── #}
      <template x-if="detail.proof">
        <div class="rounded-xl border border-base-200 bg-white px-5 py-4 dark:border-base-700 dark:bg-base-800">
          <p class="mb-3 text-sm font-semibold text-base-900 dark:text-white">Teslimat Kodu (PIN)</p>
          <div class="flex flex-wrap gap-4 text-sm">
            <div>
              <span class="text-xs text-base-500">Durum</span>
              <p
                class="font-semibold"
                :class="{
                  'text-emerald-600 dark:text-emerald-400': detail.proof.status === 'verified',
                  'text-amber-600 dark:text-amber-400': detail.proof.status === 'pending',
                  'text-rose-600 dark:text-rose-400': detail.proof.status === 'failed',
                }"
                x-text="{pending:'Bekliyor', verified:'Doğrulandı', failed:'Başarısız', expired:'Süresi Doldu'}[detail.proof.status] || detail.proof.status"
              ></p>
            </div>
            <div>
              <span class="text-xs text-base-500">Deneme Sayısı</span>
              <p class="font-medium text-base-900 dark:text-white" x-text="detail.proof.verificationAttempts"></p>
            </div>
            <template x-if="detail.proof.pinSentAt">
              <div>
                <span class="text-xs text-base-500">Gönderilme</span>
                <p class="font-medium text-base-900 dark:text-white" x-text="detail.proof.pinSentAt"></p>
              </div>
            </template>
            <template x-if="detail.proof.pinVerifiedAt">
              <div>
                <span class="text-xs text-base-500">Doğrulanma</span>
                <p class="font-medium text-emerald-600 dark:text-emerald-400" x-text="detail.proof.pinVerifiedAt"></p>
              </div>
            </template>
          </div>
        </div>
      </template>

      {# ── Mesajlar ── #}
      <div class="rounded-xl border border-base-200 bg-white px-5 py-4 dark:border-base-700 dark:bg-base-800">
        <p class="mb-3 text-sm font-semibold text-base-900 dark:text-white">
          Mesajlar
          <span class="ml-1 rounded-full bg-violet-100 px-2 py-0.5 text-xs font-semibold text-violet-700 dark:bg-violet-900/40 dark:text-violet-300" x-text="detail.messages.length"></span>
        </p>
        <template x-if="detail.messages.length === 0">
          <p class="text-xs text-base-400">Henüz mesaj yok.</p>
        </template>
        <div class="space-y-2 max-h-72 overflow-y-auto pr-1">
          <template x-for="(msg, i) in detail.messages" :key="i">
            <div
              class="rounded-lg px-3 py-2 text-sm"
              :class="msg.role === 'buyer'
                ? 'bg-blue-50 text-blue-900 dark:bg-blue-900/30 dark:text-blue-200'
                : 'bg-violet-50 text-violet-900 dark:bg-violet-900/30 dark:text-violet-200'"
            >
              <div class="flex items-center justify-between mb-0.5">
                <span class="text-xs font-semibold" x-text="msg.sender + ' (' + (msg.role === 'buyer' ? 'Alıcı' : 'Satıcı') + ')'"></span>
                <span class="text-xs opacity-60" x-text="msg.createdAt"></span>
              </div>
              <p x-text="msg.message"></p>
            </div>
          </template>
        </div>
      </div>

    </div>
  </template>

</div>

{# Render the standard Django admin change form below our live cards #}
{{ block.super }}
{% endblock %}
