name: Deploy Django

on:
  push:
    branches:
      - main
    paths:
      - 'apps/django/**'
      - 'scripts/deploy/local-django-dev-deploy.sh'
      - '.github/workflows/deploy-django.yml'
  workflow_dispatch:

concurrency:
  group: deploy-django-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Django on home runner
    runs-on:
      - self-hosted
      - macOS
      - ARM64
      - coziyoo-home
    timeout-minutes: 10

    steps:
      - name: Deploy local Django server
        run: |
          set -euo pipefail
          bash /Users/ismetkarakus/Work/coziyoo-v2/scripts/deploy/local-django-dev-deploy.sh
